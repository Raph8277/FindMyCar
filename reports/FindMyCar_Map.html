      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 10px;
    }
    #header h1 { font-size: 1.4rem; color: #fff; }
    #header p { font-size: 0.82rem; color: #aac; margin-top: 3px; }
    .badge { background: #e94560; color: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.78rem; font-weight: 700; }

    #controls {
      background: #16213e;
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #0f3460;
    }
    #controls label { font-size: 0.8rem; color: #aac; }
    #controls select, #controls input {
      background: #0f3460; color: #fff; border: 1px solid #e94560;
      border-radius: 6px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer;
    }
    #stats {
      background: #0f3460; border-radius: 8px; padding: 5px 14px;
      font-size: 0.78rem; color: #7cf; margin-left: auto;
    }

    #map { width: 100%; height: calc(100vh - 130px); }

    /* Legend */
    .legend {
      background: rgba(22,33,62,0.95); border: 1px solid #0f3460;
      border-radius: 8px; padding: 12px 16px; font-size: 0.76rem; color: #ccc;
      line-height: 1.9;
    }
    .legend h4 { color: #fff; margin-bottom: 8px; font-size: 0.82rem; letter-spacing: .5px; }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: #16213e; border: 1px solid #e94560;
      border-radius: 10px; color: #eee;
      box-shadow: 0 4px 20px rgba(0,0,0,.6);
    }
    .leaflet-popup-tip { background: #e94560; }
    .popup-title { font-size: 1rem; font-weight: 700; color: #e94560; margin-bottom: 8px; }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; font-size: 0.8rem; margin: 3px 0; }
    .popup-key { color: #aac; }
    .popup-val { color: #fff; font-weight: 600; }
    .popup-badge {
      display: inline-block; border-radius: 4px; padding: 2px 8px;
      font-size: 0.72rem; font-weight: 700; margin-top: 6px;
    }
    .badge-part { background: #0f3460; color: #7cf; }
    .badge-pro  { background: #1a472a; color: #6effa0; }
    .badge-star { background: #4a2000; color: #ffd060; }
    .popup-dist { font-size: 0.78rem; color: #f90; margin-top: 4px; }
    .popup-links { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:9px; }
    .platform-btn {
      display:block; padding:5px 4px;
      border-radius:4px; font-size:0.72rem; font-weight:700;
      text-decoration:none; text-align:center; transition:opacity .15s;
    }
    .platform-btn:hover { opacity:.8; text-decoration:none; }
    .btn-as24   { background:#e94560; color:#fff; }
    .btn-lbc    { background:#ff6e14; color:#fff; }
    .btn-lc     { background:#1565c0; color:#fff; }
    .btn-largus { background:#2e7d32; color:#fff; }

    .home-icon { font-size: 24px; line-height: 1; }

// ── Calcul distance (Haversine) ────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
vehicles.forEach(v => v.dist = haversine(HOME.lat,HOME.lng,v.lat,v.lng));

// ── Jitter : 1 véhicule = 1 point distinct sur la carte ──────────────────────
// Les véhicules de la même ville sont répartis en anneaux concentriques.
// Rayon anneau 1 ≈ 0.025° (~2.5 km) — réaliste au niveau quartier.
(function applyJitter() {
  const BASE_R  = 0.025; // degrés par anneau (~2.5 km)
  const PER_RING = 6;    // véhicules max par anneau
  const groups = {};
  vehicles.forEach(v => {
    const key = `${v.city}_${v.dept}`;
    (groups[key] = groups[key] || []).push(v);
  });
  Object.values(groups).forEach(grp => {
    if (grp.length < 2) return;
    const n    = grp.length;
    const cLat = grp.reduce((s, v) => s + v.lat, 0) / n;
    const cLng = grp.reduce((s, v) => s + v.lng, 0) / n;
    const cosLat = Math.cos(cLat * Math.PI / 180);
    grp.forEach((v, i) => {
      const ring       = Math.floor(i / PER_RING) + 1;
      const posInRing  = i % PER_RING;
      const inThisRing = Math.min(PER_RING, n - (ring - 1) * PER_RING);
      const angle = (2 * Math.PI * posInRing / inThisRing) - Math.PI / 2;
      const r = BASE_R * ring;
      v.lat = cLat + r * Math.cos(angle);
      v.lng = cLng + r * Math.sin(angle) / cosLat;
    });
  });
})();

// Marges communes : prix ±15% · km +30 000
function pLo(v){ return Math.max(0, Math.round(v.price * 0.85)); }
function pHi(v){ return Math.round(v.price * 1.15); }

// AutoScout24 — année exacte · prix ±15% · km +30 000 · carburant · France
function urlAS24(v) {
  const slug = MODEL_SLUG_AS24[v.model]||"";
  const fuel = FUEL_CODE[v.fuel]||"";
  return `https://www.autoscout24.fr/lst/${slug}?sort=price&desc=0&offertype=U`
       + `&price_from=${pLo(v)}&price_to=${pHi(v)}`
       + `&re_from=${v.year}&re_to=${v.year}`
       + `&km_to=${v.km+30000}`
       + (fuel?`&fuel=${fuel}`:"")
       + `&cy=F`;
}

// LeBonCoin ✅ — text = modèle seul (sans année dans le texte)
// Filtres natifs LBC : regdate=ANNÉE-ANNÉE · price=MIN-MAX · mileage=0-MAX
// Marges larges pour éviter zéro résultat : prix ±20% · km +30 000
const LBC_TERMS = {
  "Dacia Sandero":"dacia sandero", "Renault Clio":"renault clio",
  "VW Polo":"volkswagen polo",    "Peugeot 208":"peugeot 208",
  "Citroën C3":"citroen c3",      "Opel Corsa":"opel corsa",
  "Ford Fiesta":"ford fiesta",    "Toyota Yaris":"toyota yaris",
  "SEAT Ibiza":"seat ibiza"
};
function urlLBC(v) {
  const q = encodeURIComponent((LBC_TERMS[v.model]||v.model.toLowerCase()) + " " + v.year);
  return `https://www.leboncoin.fr/recherche?category=2&text=${q}&price=${pLo(v)}-${pHi(v)}`;
}

// LaCentrale ✅ — format URL /auto/occasion/voiture/{slug}/ avec filtres query
const LC_SLUG = {
  "Dacia Sandero":"dacia+sandero", "Renault Clio":"renault+clio",
  "VW Polo":"volkswagen+polo",    "Peugeot 208":"peugeot+208",
  "Citroën C3":"citroen+c3",      "Opel Corsa":"opel+corsa",
  "Ford Fiesta":"ford+fiesta",    "Toyota Yaris":"toyota+yaris",
  "SEAT Ibiza":"seat+ibiza"
};
// LaCentrale — page modèle directe (query params = 403 bloquant)
function urlLC(v) {
  return `https://www.lacentrale.fr/auto/occasion/voiture/${LC_SLUG[v.model]||""}/`;
}

// L'Argus — page modèle + pricemax uniquement (kmmax ignoré côté serveur)
function urlLargus(v) {
  return `https://www.largus.fr/occasion/annonces/${MODEL_SLUG_LARGUS[v.model]||""}.html`
       + `?pricemax=${pHi(v)}`;
}

// Routeur : renvoie l'URL de la plateforme hôte du véhicule
function buildUrl(v) {
  if (v.source === "LBC")  return urlLBC(v);
  if (v.source === "LC")   return urlLC(v);
  if (v.source === "LAR")  return urlLargus(v);
  return urlAS24(v); // AS24 par défaut
}

      <div class="popup-row"><span class="popup-key">Kilométrage</span><span class="popup-val">${v.km.toLocaleString('fr-FR')} km</span></div>
      <div class="popup-row"><span class="popup-key">Prix</span><span class="popup-val" style="color:#6effa0">${v.price.toLocaleString('fr-FR')} €</span></div>
      <div class="popup-row"><span class="popup-key">Carburant</span><span class="popup-val">${v.fuel}</span></div>
      <div class="popup-row"><span class="popup-key">Vendeur</span><span class="popup-val">${v.seller}</span></div>
      <div class="popup-row"><span class="popup-key">Score</span><span class="popup-val" style="color:${scoreColor}">${v.score}/100</span></div>
      <div style="margin-top:6px">${selBadge} &nbsp; ${coteBadge}</div>
      <div class="popup-dist">📍 ${v.city} (${v.dept}) · <strong>${v.dist} km</strong> de Gault-Saint-Denis</div>
      <a class="platform-btn ${PLATFORM_META[v.source].cls}" style="display:block;margin-top:9px;text-align:center;padding:6px 4px"
         href="${buildUrl(v)}" target="_blank">${PLATFORM_META[v.source].label}</a>
    </div>`;
}

function createMarker(v){
  const color = getColor(v.model);
  const r = getRadius(v.score);
  const circle = L.circleMarker([v.lat,v.lng],{
    radius: r, color:'#fff', weight:1.5,
    fillColor: color, fillOpacity: v.type==='Pro'?1:0.75
  }).bindPopup(buildPopup(v), {maxWidth:320});
  return { marker:circle, vehicle:v };
}

vehicles.forEach(v => markers.push(createMarker(v)));

// ── LAYER GROUP ────────────────────────────────────────────────────────────────
let layerGroup = L.layerGroup().addTo(map);
function renderMarkers(filtered){
  layerGroup.clearLayers();
  filtered.forEach(({marker}) => layerGroup.addLayer(marker));
  document.getElementById('countVisible').textContent = filtered.length;
}
renderMarkers(markers);

// ── FILTRES ───────────────────────────────────────────────────────────────────
function applyFilters(){
  const model  = document.getElementById('filterModel').value;
  const price  = parseInt(document.getElementById('filterPrice').value);
  const seller = document.getElementById('filterSeller').value;
  const dist   = parseInt(document.getElementById('filterDist').value);

  const filtered = markers.filter(({vehicle:v}) => {
    if(model!=='all' && v.model!==model) return false;
    if(v.price>price) return false;
    if(seller==='Particulier' && v.type!=='P') return false;
    if(seller==='Pro' && v.type!=='Pro') return false;
    if(v.dist>dist) return false;
    return true;
  });
  renderMarkers(filtered);
}

// ── LÉGENDE ───────────────────────────────────────────────────────────────────
const legend = L.control({position:'bottomright'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `<h4>Modèles</h4>`;
  Object.entries(MODEL_COLORS).forEach(([model,color]) => {
    div.innerHTML += `<div><span class="dot" style="background:${color}"></span>${model}</div>`;
  });
  div.innerHTML += `<hr style="border-color:#0f3460;margin:8px 0">
    <h4>Cercles distance</h4>
    <div><span class="dot" style="background:#00c853"></span>≤ 150 km</div>
    <div><span class="dot" style="background:#ffd600"></span>≤ 300 km</div>
    <div><span class="dot" style="background:#ff6d00"></span>≤ 500 km</div>
    <hr style="border-color:#0f3460;margin:8px 0">
    <h4>Taille du cercle</h4>
    <div><span class="dot" style="background:#888;width:18px;height:18px"></span>Score ≥ 85</div>
    <div><span class="dot" style="background:#888;width:14px;height:14px"></span>Score 70–84</div>
    <div><span class="dot" style="background:#888;width:11px;height:11px"></span>Score 55–69</div>
    <div><span class="dot" style="background:#888;width:9px;height:9px"></span>Score &lt; 55</div>
    <hr style="border-color:#0f3460;margin:8px 0">
    <div><span class="dot" style="background:#888;opacity:1"></span>Professionnel</div>
    <div><span class="dot" style="background:#888;opacity:0.65"></span>Particulier</div>`;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
